<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>My Works Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            /* 背景を紫・紺・マゼンタが混ざる鮮やかなグラデーションに変更 */
            background: radial-gradient(circle at top, #2e1065 0%, #0f172a 100%);
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-6 font-sans">

    <div class="w-full max-w-md mt-10">
        <div class="text-center mb-10">
            <!-- タイトルをピンク〜オレンジのグラデーション文字に変更 -->
            <h1 class="text-3xl font-extrabold tracking-tighter mb-2 bg-gradient-to-r from-pink-400 via-rose-400 to-orange-400 bg-clip-text text-transparent">
                My Works Portal
            </h1>
            <p class="text-sm text-gray-400 leading-relaxed px-4">
                創作活動のリンクです。詳細は下記をご確認ください。
            </p>
        </div>

        <div class="space-y-6">
          
          <!-- カードの外枠に鮮やかなグラデーション（ピンク〜パープル〜シアン）を適用 -->
          <a href="https://www.dmm.co.jp/dc/doujin/-/list/=/article=maker/exclude_ai=0/id=232886/" target="_blank"
            class="glass-card block w-full p-5 rounded-2xl hover:scale-[1.02] transition-all duration-300 shadow-2xl border-2 border-transparent bg-clip-border relative before:absolute before:inset-0 before:rounded-2xl before:border-2 before:border-transparent before:bg-gradient-to-r before:from-pink-500 before:via-purple-500 before:to-cyan-500 before:[mask-composite:exclude] before:[text-shadow:0_0_20px_rgba(244,63,94,0.5)]">
            
            <div class="font-bold text-xl mb-1 bg-gradient-to-r from-pink-400 to-purple-400 bg-clip-text text-transparent relative z-10">
                FANZA同人
            </div>
            <div class="text-xs text-gray-300 leading-tight relative z-10">
                作品を販売・公開しています。こちらから詳細をご確認いただけます。
            </div>
          </a>

        </div>

        <p class="text-center text-[10px] text-gray-600 mt-16">
          © 2026 / Private Portal / No Index Requested
        </p>
    </div>

</body>
</html>
