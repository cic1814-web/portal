<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>My Works Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            /* 背景をご指定の「背景.jpg」に設定し、画面全体に固定して表示 */
            background: url('背景.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ea580c; 
        }
        /* 透過を完全に無くし、文字を見やすくするために白で塗りつぶし */
        .solid-card {
            background-color: #ffffff;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-6 font-sans">

    <!-- コンテンツエリアの背景も透過を完全に無くし、はっきりとした白のボックスに変更 -->
    <div class="w-full max-w-md mt-8 flex flex-col items-center solid-card p-6 rounded-3xl shadow-2xl">
        
        <!-- 1. プロフィール画像（丸型アイコン） -->
        <div class="w-28 h-28 rounded-full border-4 border-orange-100 shadow-md overflow-hidden mb-4 bg-white">
            <img src="学生服.jpg" alt="Profile" class="w-full h-full object-cover">
        </div>

        <!-- 2. プロフィールテキスト -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-wide text-orange-600 mb-2">
                BIGchan
            </h1>
            <!-- 「AIでムフフなイラストを生成してます」を削除 -->
            
            <!-- 「（Xを除く）」を削除 -->
            <p class="text-[11px] text-amber-950 font-bold leading-relaxed px-6">
                掲載イラストは全てAIで生成しております<br>
                下記リンク先はR-18要素を含みますので、18歳未満の方は閲覧禁止です
            </p>
        </div>

        <!-- 3. リンク一覧部分 -->
        <div class="w-full space-y-4">
          
          <!-- FANZA同人のリンクカード：透過を排除した純白のカードに変更 -->
          <a href="https://www.dmm.co.jp/dc/doujin/-/list/=/article=maker/exclude_ai=0/id=232886/" target="_blank"
            class="solid-card block w-full p-5 rounded-2xl shadow-md hover:scale-[1.01] transition-all duration-300 border border-orange-100">
            
            <div class="font-extrabold text-lg text-orange-600 mb-1">
                FANZA同人
            </div>
            
            <!-- 「生成イラスト一覧はこちらへ」を削除し、指定の表記のみに修正 -->
            <div class="text-xs text-amber-900 font-bold tracking-wide">
                【稼働中】（R-18要素アリ）
            </div>
          </a>

        </div>

        <!-- フッター -->
        <p class="text-center text-[10px] text-amber-900/60 mt-16 tracking-wider font-bold">
          © 2026 / Private Portal / No Index Requested
        </p>
    </div>

</body>
</html>
