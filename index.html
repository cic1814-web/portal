<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>My Works Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            /* Lit.Linkに近い、温かみのある明るいクリーム色のグラデーション背景 */
            background: linear-gradient(135deg, #fef08a 0%, #fefcbf 50%, #fef08a 100%);
            color: #ea580c; 
            background-attachment: fixed;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-6 font-sans">

    <div class="w-full max-w-md mt-8 flex flex-col items-center">
        
        <!-- 1. プロフィール画像（丸型アイコン） -->
        <div class="w-28 h-28 rounded-full border-4 border-white shadow-md overflow-hidden mb-4 bg-white">
            <!-- 指定されたアイコン画像ファイルを設定 -->
            <img src="学生服.jpg" alt="Profile" class="w-full h-full object-cover">
        </div>

        <!-- 2. プロフィールテキスト -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-wide text-orange-600 mb-1">
                BIGchan
            </h1>
            <p class="text-sm font-bold text-orange-500 mb-2">
                AIでムフフなイラストを生成してます
            </p>
            <p class="text-[11px] text-amber-700 font-medium leading-relaxed px-6">
                掲載イラストは全てAIで生成しております<br>
                下記リンク先はR-18要素を含みますので、18歳未満の方は閲覧禁止です（Xを除く）
            </p>
        </div>

        <!-- 3. リンク一覧部分 -->
        <div class="w-full space-y-4">
          
          <!-- ▼ 大きな画像付きリンクカード（FANZA同人） ▼ -->
          <a href="https://www.dmm.co.jp/dc/doujin/-/list/=/article=maker/exclude_ai=0/id=232886/" target="_blank"
            class="block w-full h-52 rounded-2xl overflow-hidden shadow-lg hover:scale-[1.01] transition-all duration-300 relative group bg-amber-100">
            
            <!-- 指定されたカード背景画像ファイルを設定 -->
            <img src="背景.jpg" alt="FANZA同人" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            
            <!-- 上部の白背景のラベルタグ -->
            <div class="absolute top-3 left-3 bg-white/95 backdrop-blur-sm px-4 py-1 rounded-lg shadow-sm">
                <span class="font-bold text-sm text-orange-600">FANZA同人</span>
            </div>
            
            <!-- 下部の白背景の説明帯 -->
            <div class="absolute bottom-3 left-3 bg-white/95 backdrop-blur-sm px-3 py-1 rounded-md shadow-sm max-w-[90%]">
                <span class="text-[10px] font-bold text-amber-800 block truncate">【稼働中】生成イラスト一覧はこちらへ（無料/R-18要素アリ）</span>
            </div>
          </a>
          <!-- ▲ ここまで画像カード ▲ -->

        </div>

        <!-- フッター -->
        <p class="text-center text-[10px] text-amber-700/60 mt-16 tracking-wider">
          © 2026 / Private Portal / No Index Requested
        </p>
    </div>

</body>
</html>
